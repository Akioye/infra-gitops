name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/myapp:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/myapp:$IMAGE_TAG

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: Akioye/k8s-manifests
          token: ${{ secrets.MANIFESTS_TOKEN }}
          path: k8s-manifests

      - name: Update STAGING image tag only
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed -i "s|image: .*myapp:.*|image: $ECR_REGISTRY/myapp:$IMAGE_TAG|g" \
            k8s-manifests/apps/staging/deployment.yaml

      - name: Push updated staging manifest
        run: |
          cd k8s-manifests
          git config user.email "ci@gitops.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "chore: deploy myapp:${{ env.IMAGE_TAG }} to staging"
          git push

      - name: Notify Slack - Staging Deploy
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🧪 Staging updated: myapp:${{ env.IMAGE_TAG }} — pushed by ${{ github.actor }}. Test it and promote to production when ready."
            }

      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 Deployment FAILED — pushed by ${{ github.actor }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }